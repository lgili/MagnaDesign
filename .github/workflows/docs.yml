name: Docs

# Trigger model:
# - On every release (the ``release: published`` event fires
#   when a tag is published from a draft or directly from the
#   GitHub UI / ``gh release create``). The published build
#   re-renders all historical tags via sphinx-multiversion and
#   pushes the result to GitHub Pages.
# - On pull requests touching docs / Python sources / this
#   workflow — runs the single-version Sphinx build only (no
#   deploy) so reviewers can spot broken references in the PR
#   without polluting the published site.
# - Manually via ``workflow_dispatch`` for backfill / when a
#   release was created without going through the workflow.
on:
  release:
    types: [published]
  pull_request:
    paths:
      - "docs/**"
      - "src/pfc_inductor/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # ``sphinx-multiversion`` needs the full git history +
          # every tag so it can render past releases. The default
          # shallow clone strips them, leaving only ``main``.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux Qt runtime libs (autodoc imports the package)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libglib2.0-0 libxkbcommon0 \
            libdbus-1-3 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xkb1 libxkbcommon-x11-0 \
            libxcb-shm0 libxcb-glx0 libfontconfig1 libxrender1

      - name: Install package + docs extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build single-version HTML (PR previews)
        if: github.event_name == 'pull_request'
        env:
          QT_QPA_PLATFORM: offscreen
        # ``--keep-going`` so warnings don't break the build (the
        # site has accumulated ~40 pre-existing autodoc / docstring
        # warnings that the team is working through incrementally).
        run: |
          sphinx-build -b html docs docs/_build/html \
            --keep-going -w docs/_build/warnings.log
          echo "Sphinx warnings captured in docs/_build/warnings.log"

      - name: Build multi-version HTML (releases + manual rebuilds)
        if: github.event_name != 'pull_request'
        env:
          QT_QPA_PLATFORM: offscreen
        # ``sphinx-multiversion`` re-runs Sphinx once per
        # whitelisted ref (every ``v*.*.*`` tag + ``main``).
        # Output lands at ``docs/_build/multi/<ref>/`` per the
        # ``smv_outputdir_format`` setting in conf.py.
        run: |
          sphinx-multiversion docs docs/_build/multi
          echo "Built versions:"
          ls docs/_build/multi/

      - name: Generate root redirect → latest tag
        if: github.event_name != 'pull_request'
        # ``sphinx-multiversion`` writes per-version subdirs but
        # nothing at the bundle root. We synthesise a minimal
        # ``index.html`` that redirects to the highest semver
        # tag (the published release the build was triggered
        # from). Falls back to ``main`` when no tags exist
        # (first release before tags land).
        run: |
          python <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          root = Path("docs/_build/multi")
          if not root.is_dir():
              sys.exit("multi-version build directory missing")

          versions = [
              p.name for p in root.iterdir()
              if p.is_dir() and (p / "index.html").exists()
          ]
          if not versions:
              sys.exit("no built versions found")

          # Sort tags by semver so the redirect always points at
          # the newest stable version, not whatever sorted last
          # alphabetically (``v0.10.0`` would lose to ``v0.2.0``
          # under a plain ``sorted`` call).
          tag_re = re.compile(r"^v(\d+)\.(\d+)\.(\d+)$")
          tagged = sorted(
              [v for v in versions if tag_re.match(v)],
              key=lambda v: tuple(int(x) for x in tag_re.match(v).groups()),
              reverse=True,
          )
          target = tagged[0] if tagged else "main"
          print(f"redirecting / → /{target}/")

          (root / "index.html").write_text(
              "<!doctype html>\n"
              '<meta http-equiv="refresh" '
              f'content="0; url={target}/">\n'
              f'<link rel="canonical" href="{target}/">\n'
              "<title>MagnaDesign documentation</title>\n"
              f'<p>Redirecting to <a href="{target}/">'
              f"the {target} docs</a>…</p>\n"
          )

          # Tell GitHub Pages not to run Jekyll over the bundle
          # (Jekyll would mangle ``_static`` paths starting with
          # an underscore).
          (root / ".nojekyll").write_text("")

          # Generate a tiny ``versions.json`` the version selector
          # could read at runtime if we ever switch from server-
          # rendered to client-rendered selectors.
          import json
          (root / "versions.json").write_text(
              json.dumps(
                  {"latest": target, "available": [target] + [v for v in versions if v != target]},
                  indent=2,
              )
          )
          PY

      - name: Upload Pages artifact (releases + manual only)
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/multi

      - name: Upload PR-preview artifact (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview-pr-${{ github.event.pull_request.number }}
          path: docs/_build/html
          retention-days: 7

  deploy:
    needs: build
    # Deploy is gated on the release event — PR builds never
    # touch the public site, only their own per-build artifact.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Once GitHub Pages is enabled in the repo settings, drop
    # ``continue-on-error``. Until then this lets the workflow
    # surface as green even if Pages isn't configured (the build
    # artifact is still uploaded for manual inspection).
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
